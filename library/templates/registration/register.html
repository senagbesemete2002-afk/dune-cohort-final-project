{% extends 'base.html' %}

{% block content %}

<h1>{% if role %}Register as {{ role|title }}{% else %}Register{% endif %}</h1>

{% if not role %}
    <p>Choose whether to register as a student or as a staff member.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

{% endblock %}
