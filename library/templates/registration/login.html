{% extends 'base.html' %}

{% block content %}

<h1>Login</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
    <input type="hidden" name="next" value="{{ next }}">
</form>

<p>Register as a <a href="{% url 'register_student' %}">Student</a> or <a href="{% url 'register_staff' %}">Staff</a>.</p>

{% endblock %}
