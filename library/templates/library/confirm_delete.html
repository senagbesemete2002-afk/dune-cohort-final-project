{% extends 'base.html' %}

{% block content %}

<h1>Confirm Delete</h1>

<p>Are you sure you want to delete "{{ book.title }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'book_detail' book.id %}">Cancel</a>
</form>

{% endblock %}
